<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Thank You</title>

  <link rel="stylesheet"
  href="style.css">

  <style>

    body {

      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      background: #0f172a;

      color: white;

      font-family: Arial, sans-serif;

      text-align: center;

      padding: 20px;
    }

    .thanks-box {

      background: #1e293b;

      padding: 50px 40px;

      border-radius: 20px;

      max-width: 500px;

      box-shadow:
      0 0 30px rgba(0,0,0,0.3);
    }

    .thanks-box h1 {

      font-size: 2.5rem;

      margin-bottom: 20px;
    }

    .thanks-box p {

      color: #cbd5e1;

      line-height: 1.7;

      margin-bottom: 30px;
    }

    .btn {

      display: inline-block;

      padding: 12px 24px;

      background: #38bdf8;

      color: #020617;

      text-decoration: none;

      border-radius: 10px;

      font-weight: bold;

      transition: 0.25s ease;
    }

    .btn:hover {

      transform: translateY(-3px);

      box-shadow:
      0 0 20px rgba(56,189,248,0.4);
    }

  </style>

</head>

<body>

  <div class="thanks-box">

    <h1>Thank You 🚀</h1>

    <p>

      Your message has been submitted successfully.
      I’ll get back to you as soon as possible.

    </p>

    <a
    href="index.html"
    class="btn">

      Back to Portfolio

    </a>

  </div>

</body>
</html>
